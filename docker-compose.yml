# ============================================================
# City-Mapper — Docker Compose Orchestration
# ============================================================
# Services:
#   - traefik:  Reverse proxy + automatic HTTPS + routing
#   - backend:  C++ Drogon REST API (port 8080)
#   - frontend: Angular 19 app served by nginx (port 80)
# ============================================================

services:
  # ── Reverse Proxy ──────────────────────────────────────────
  traefik:
    image: traefik:v3.0
    container_name: citymapper-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8090:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - citymapper

  # ── C++ Backend API ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: citymapper-backend
    restart: unless-stopped
    environment:
      - DATA_PATH=/app/data/csv
      - STATIONS_FILE=s.csv
      - CONNECTIONS_FILE=c.csv
      - HOST=0.0.0.0
      - PORT=8080
      - CACHE_SIZE=10000
      - THREAD_COUNT=4
    volumes:
      - ./data:/app/data/csv:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.citymapper.localhost`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=8080"
    networks:
      - citymapper
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  # ── Angular Frontend ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: citymapper-frontend
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`citymapper.localhost`)"
      - "traefik.http.routers.web.entrypoints=web"
      - "traefik.http.services.web.loadbalancer.server.port=80"
    networks:
      - citymapper
    depends_on:
      backend:
        condition: service_healthy

networks:
  citymapper:
    driver: bridge
