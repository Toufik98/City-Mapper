# ============================================================
# City-Mapper — Production Docker Compose
# Deployed to Hetzner server, proxied by nginx-infra
# ============================================================

services:
  # ── C++ Backend API ────────────────────────────────────────
  citymapper-backend:
    image: ghcr.io/toufik98/city-mapper-backend:latest
    container_name: citymapper-backend
    restart: unless-stopped
    environment:
      - DATA_PATH=/app/data/csv
      - STATIONS_FILE=s.csv
      - CONNECTIONS_FILE=c.csv
      - HOST=0.0.0.0
      - PORT=8080
      - CACHE_SIZE=10000
      - THREAD_COUNT=4
    volumes:
      - ./data:/app/data/csv:ro
    networks:
      - prodataviz_default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  # ── Angular Frontend ───────────────────────────────────────
  citymapper-frontend:
    image: ghcr.io/toufik98/city-mapper-frontend:latest
    container_name: citymapper-frontend
    restart: unless-stopped
    networks:
      - prodataviz_default
    depends_on:
      citymapper-backend:
        condition: service_healthy

networks:
  prodataviz_default:
    external: true
